<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DicekOut | Rekomendasi Produk dari Konten Pilihan</title>
    <meta
      name="description"
      content="Temukan produk yang dibahas di konten DicekOut, baca alasan rekomendasinya, lalu cek penawaran terbaru langsung di marketplace."
    />
    <meta name="author" content="DicekOut" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#f4f4f4" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("dicekout.theme");
          const theme = saved === "dark" || saved === "light"
            ? saved
            : (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute(
            "content",
            theme === "dark" ? "#090a0c" : "#f4f4f4",
          );
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="canonical" href="https://dicekout.id/" />
    <link rel="icon" type="image/png" sizes="64x64" href="%BASE_URL%brand/favicon-64.png" />
